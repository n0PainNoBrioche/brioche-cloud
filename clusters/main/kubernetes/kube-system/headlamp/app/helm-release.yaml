---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: headlamp
      version: 0.42.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    args:
      - --plugin-dir=/build/plugins
      
    service:
      type: LoadBalancer
      loadBalancerIP: ${HEADLAMP_IP}
      port: 80

    ingress:
      enabled: true
      ingressClassName: internal
      hosts:
        - host: kube.${DOMAIN_0}
          paths:
            - path: /
              type: Prefix