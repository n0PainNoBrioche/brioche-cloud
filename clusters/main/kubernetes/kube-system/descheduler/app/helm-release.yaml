apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: descheduler
    namespace: kube-system
spec:
    interval: 15m
    chart:
        spec:
            chart: descheduler
            version: 0.35.1
            sourceRef:
                kind: HelmRepository
                name: home-ops-mirror
                namespace: flux-system
            interval: 15m
    timeout: 20m
    maxHistory: 3
    install:
        createNamespace: true
        remediation:
            retries: 3
    upgrade:
        cleanupOnFail: true
        remediation:
            retries: 3
    uninstall:
        keepHistory: false
    values:
      replicas: 1
      kind: Deployment
      deschedulerPolicyAPIVersion: descheduler/v1alpha2
      deschedulerPolicy:
        profiles:
          - name: Default
            pluginConfig:
              - name: DefaultEvictor
                args:
                  evictFailedBarePods: true
                  evictLocalStoragePods: true
                  evictSystemCriticalPods: false
              - name: RemoveFailedPods
                args:
                  reasons:
                    - ContainerStatusUnknown
                    - NodeShutdown
                    - Terminated
                    - UnexpectedAdmissionError
                  includingInitContainers: true
                  excludeOwnerKinds:
                    - Job
                  minPodLifetimeSeconds: 1800
            plugins:
              deschedule:
                enabled:
                  - RemoveFailedPods
      service:
        enabled: true
      serviceMonitor:
        enabled: true
      leaderElection:
        enabled: false