apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 5m
  chart:
    spec:
      chart: velero
      version: 12.0.3
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    configuration:
      backupStorageLocation:
        - name: minio
          provider: aws
          bucket: "${S3_BUCKET}-velero"
          default: true
          config:
            region: eu-west-3
            s3ForcePathStyle: "true"
            s3Url: "${S3_URL_MINIO}"
            insecureSkipTLSVerify: "true"

      volumeSnapshotLocation:
      - name: default
        provider: aws
        config:
          region: eu-west-3
          
    initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.14.1
      volumeMounts:
        - mountPath: /target
          name: plugins

    credentials:
      useSecret: true
      secretContents:
        cloud: |
          [default]
          aws_access_key_id = ${S3_ACCESS_KEY}
          aws_secret_access_key = ${S3_SECRET_KEY}

    deployNodeAgent: true
    snapshotsEnabled: true
    defaultVolumesToFsBackup: true