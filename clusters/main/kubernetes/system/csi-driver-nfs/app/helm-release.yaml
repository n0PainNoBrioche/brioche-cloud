apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: csi-driver-nfs
    namespace: csi-driver-nfs
spec:
    interval: 5m
    chart:
        spec:
            # renovate: registryUrl=https://charts.truechartsoci.org
            chart: csi-driver-nfs
            version: 4.9.0
            sourceRef:
              kind: HelmRepository
              name: csi-driver-nfs
              namespace: flux-system
            interval: 5m
    install:
        createNamespace: true
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    values:
        storageClass:
            create: true
            name: nfs-csi
            defaultClass: false
            reclaimPolicy: Delete
            volumeBindingMode: Immediate
            mountOptions:
            - nfsvers=4.1
            parameters:
            server: 192.168.1.50
            share: /vm/talos
            subDir: ${pvc.metadata.name}