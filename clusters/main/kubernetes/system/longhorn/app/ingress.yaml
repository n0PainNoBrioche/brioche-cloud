apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    cert-manager.io/cluster-issuer: domain-0-le-prod

    # Authentik (nginx forward auth)
    nginx.ingress.kubernetes.io/auth-url: "http://authentik-http.authentik.svc.cluster.local:10230/outpost.goauthentik.io/auth/nginx"
    nginx.ingress.kubernetes.io/auth-signin: "https://portal.${DOMAIN_0}/outpost.goauthentik.io/start?rd=$scheme://$host$request_uri"

spec:
  ingressClassName: internal
  tls:
    - hosts:
        - longhorn.${DOMAIN_0}
      secretName: longhorn-tls

  rules:
    - host: longhorn.${DOMAIN_0}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80