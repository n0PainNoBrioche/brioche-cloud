apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
  namespace: hermes
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 18.5.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    image:
      repository: nousresearch/hermes-agent
      tag: latest
      pullPolicy: Always

    service:
      main:
        ports:
          main:
            enabled: true
            protocol: http
            port: 8642
            targetPort: 8642

    securityContext:
      container:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        readOnlyRootFilesystem: false
      pod:
        fsGroup: 568

    workload:
      main:
        podSpec:
          initContainers:
            init-config:
              enabled: true
              type: init
              image:
                repository: busybox
                tag: latest
              command:
                - sh
                - -c
                - |
                  # Patch config.yaml
                  sed -i 's|provider: "auto"|provider: "openai-compatible"|' /opt/data/config.yaml
                  sed -i 's|base_url: "https://openrouter.ai/api/v1"|base_url: "http://ollama-api.ollama.svc.cluster.local:11434/v1"|' /opt/data/config.yaml

                  # Patch .env
                  grep -q "OPENAI_API_KEY" /opt/data/.env && \
                    sed -i 's|.*OPENAI_API_KEY.*|OPENAI_API_KEY=ollama|' /opt/data/.env || \
                    echo "OPENAI_API_KEY=ollama" >> /opt/data/.env

                  grep -q "OPENAI_BASE_URL" /opt/data/.env && \
                    sed -i 's|.*OPENAI_BASE_URL.*|OPENAI_BASE_URL=http://ollama-api.ollama.svc.cluster.local:11434/v1|' /opt/data/.env || \
                    echo "OPENAI_BASE_URL=http://ollama-api.ollama.svc.cluster.local:11434/v1" >> /opt/data/.env

                  grep -q "HERMES_MODEL" /opt/data/.env && \
                    sed -i 's|.*HERMES_MODEL.*|HERMES_MODEL=gemma3:4b|' /opt/data/.env || \
                    echo "HERMES_MODEL=gemma3:4b" >> /opt/data/.env

                  grep -q "GATEWAY_ALLOW_ALL_USERS" /opt/data/.env && \
                    sed -i 's|.*GATEWAY_ALLOW_ALL_USERS.*|GATEWAY_ALLOW_ALL_USERS=true|' /opt/data/.env || \
                    echo "GATEWAY_ALLOW_ALL_USERS=true" >> /opt/data/.env

                  chown 568:568 /opt/data/config.yaml /opt/data/.env
              volumeMounts:
                - name: hermes-data
                  mountPath: /opt/data
          containers:
            main:
              args:
                - "gateway"
                - "run"
              env:
                HERMES_UID: "568"
                HERMES_GID: "568"
                HERMES_HOME: "/opt/data"
                OPENAI_API_KEY: "ollama"
                OPENAI_BASE_URL: "http://ollama-api.ollama.svc.cluster.local:11434/v1"
                HERMES_MODEL: "gemma3:4b"
                GATEWAY_ALLOW_ALL_USERS: "true"
                API_SERVER_HOST: "0.0.0.0"
                API_SERVER_KEY: "${AI_API_KEY}"
              resources:
                requests:
                  memory: 512Mi
                  cpu: "100m"
                limits:
                  memory: 2Gi
                  cpu: "1"

    persistence:
      hermes-data:
        enabled: true
        type: pvc
        accessMode: ReadWriteOnce
        size: 5Gi
        mountPath: /opt/data