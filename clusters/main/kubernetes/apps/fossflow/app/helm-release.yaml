apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fossflow
  namespace: fossflow
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 18.2.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    image:
      repository: stnsmith/fossflow
      tag: latest
      pullPolicy: IfNotPresent
    service:
      main:
        ports:
          main:
            enabled: true
            protocol: http
            port: 7702
            targetPort: 80
    securityContext:
      container:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: true
        capabilities:
          add:
            - NET_BIND_SERVICE  # needed if nginx binds port 80
      pod:
        fsGroup: 0
        runAsNonRoot: false
    ingress:
        main:
          enabled: true
          ingressClassName: external
          integrations:
            traefik:
              enabled: false
            certManager:
              enabled: true
              certificateIssuer: domain-0-le-prod
            nginx:
              enabled: true
              auth:
                type: "authentik"
                internalHost: "authentik-http.authentik.svc.cluster.local:10230"
                externalHost: "portal.${DOMAIN_0}"
                responseHeaders: []
          hosts:
            - host: fossflow.${DOMAIN_0}
              paths:
                - path: /
                  pathType: Prefix
    persistence:
      fossflow-diagrams:
        enabled: true
        type: pvc
        accessMode: ReadWriteOnce
        size: 5Gi
        mountPath: /data/diagrams
