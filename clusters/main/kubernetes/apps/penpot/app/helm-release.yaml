---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: penpot
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: penpot
      version: 2.16.0
      sourceRef:
        kind: HelmRepository
        name: penpot
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    global:
      env:
        PENPOT_PUBLIC_URI: "http://penpot.${DOMAIN_0}"

    cnpg:
      main:
        enabled: true
        user: penpot
        database: penpot
        type: postgres
        cluster:
          singleNode: true
          instances: 1

    config:
      publicUri: "http://penpot.${DOMAIN_0}"
      flags: "enable-registration enable-login-with-password disable-email-verification"
      apiSecretKey: "${PENPOT_API_SECRET_KEY}"
      telemetryEnabled: false

      postgresql:
        host: "penpot-cnpg-main"
        port: 5432
        username: "penpot"
        password: "${PENPOT_DB_PASSWORD}"
        database: "penpot"
        existingSecret: ""

      redis:
        host: ""
        port: 6379
        database: "0"

      objectsStorage:
        storageBackend: "fs"
        filesystem:
          directory: "/opt/data/assets"

      smtp:
        enabled: false

    persistence:
      assets:
        enabled: true
        size: 10Gi
        storageClass:
        accessModes:
          - ReadWriteOnce

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: penpot.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix

    backend:
      replicaCount: 1
      image:
        repository: penpotapp/backend
        tag: 2.16.0
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 1
          memory: 2Gi
      startupProbe:
        httpGet:
          path: /readyz
          port: http
        failureThreshold: 30
        periodSeconds: 10

    frontend:
      replicaCount: 1
      image:
        repository: penpotapp/frontend
        tag: 2.16.0
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi

    exporter:
      enabled: false

    mcp:
      enabled: false