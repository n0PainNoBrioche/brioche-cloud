---
# 1. PostgreSQL Credentials Secret
apiVersion: v1
kind: Secret
metadata:
  name: penpot-pg-credentials
  namespace: penpot
type: kubernetes.io/basic-auth
stringData:
  username: penpot
  password: "${PENPOT_DB_PASSWORD}"

---
# 2. CNPG PostgreSQL Cluster
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: penpot-pg
  namespace: penpot
spec:
  instances: 1
  storage:
    size: 5Gi
  bootstrap:
    initdb:
      database: penpot
      owner: penpot
      secret:
        name: penpot-pg-credentials

---
# 3. Redis Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: penpot-redis
  namespace: penpot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: penpot-redis
  namespace: penpot
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
# 4. Penpot HelmRelease (CORRIGÉ)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: penpot
  namespace: penpot
spec:
  interval: 5m
  chart:
    spec:
      chart: penpot
      version: 1.4.0
      sourceRef:
        kind: HelmRepository
        name: penpot
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  timeout: 20m
  values:
    global:
      env:
        PENPOT_PUBLIC_URI: "http://penpot.${DOMAIN_0}"

    postgresql:
      host: "penpot-pg-rw"
      port: 5432
      username: "penpot"
      password: "${PENPOT_DB_PASSWORD}"
      database: "penpot"

    valkey:
      enabled: false

    config:
      publicUri: "http://penpot.${DOMAIN_0}"
      flags: "enable-registration enable-login-with-password disable-email-verification enable-mcp"
      apiSecretKey: "${PENPOT_API_SECRET_KEY}"
      telemetryEnabled: false
      redis:
        host: "penpot-redis"
        port: 6379
        database: "0"
      objectsStorage:
        storageBackend: "fs"
        filesystem:
          directory: "/opt/data/assets"
      smtp:
        enabled: false

    backend:
      replicaCount: 1
      image:
        repository: penpotapp/backend
        tag: latest
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 1
          memory: 2Gi

    frontend:
      replicaCount: 1
      image:
        repository: penpotapp/frontend
        tag: latest
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi

    persistence:
      assets:
        enabled: true
        size: 10Gi
        accessModes:
          - ReadWriteOnce

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        hosts:
          - host: penpot.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix

    exporter:
      enabled: false

    mcp:
      enabled: true