apiVersion: batch/v1
kind: Job
metadata:
  name: ha-pvc-migrate
  namespace: home-assistant
spec:
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: rsync
        image: instrumentisto/rsync-ssh
        command:
          - sh
          - -c
          - |
            set -e
            echo "=== Source ==="
            du -sh /src
            ls -la /src | head -20
            echo "=== Starting rsync ==="
            rsync -aHAX --info=progress2 --delete /src/ /dst/
            echo "=== Verification ==="
            du -sh /src /dst
            echo "DONE"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 568
          runAsGroup: 568
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - { name: src, mountPath: /src }
          - { name: dst, mountPath: /dst }
      volumes:
        - name: src
          persistentVolumeClaim:
            claimName: home-assistant-config
        - name: dst
          persistentVolumeClaim:
            claimName: home-assistant-config-nfs